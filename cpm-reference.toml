# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  cpm — Copilot Package Manager                                               ║
# ║  Reference manifest: quantum-lab (fictional research + engineering monorepo) ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# ── ARCHITECTURE OVERVIEW ────────────────────────────────────────────────────
#
#  cpm is a Rust-native package manager for GitHub Copilot assets.
#  It follows the same mental model as uv (Python) and Cargo (Rust):
#  one human-authored manifest (this file) + one machine-generated lockfile.
#
#  WHAT cpm MANAGES
#  ┌──────────────┬──────────────────────────────────────────────────────────────┐
#  │ plugins      │ Copilot extension/capability config files                    │
#  │ skills       │ Markdown prompt libraries injected into Copilot context      │
#  │ agents       │ Agent definition files (.agent.md) for agentic sessions      │
#  │ mcps         │ Model Context Protocol servers — any transport               │
#  │ hooks        │ Event-driven scripts that fire during CCA sessions           │
#  │ workflows    │ Agentic workflows — AI automation in GitHub Actions          │
#  └──────────────┴──────────────────────────────────────────────────────────────┘
#
#  TWO SCOPES
#  ┌──────────┬─────────────────────────────┬────────────────────────────────────┐
#  │          │ local (default)             │ global                             │
#  ├──────────┼─────────────────────────────┼────────────────────────────────────┤
#  │ plugin   │ .github/plugins/            │ ~/.copilot/plugins/                │
#  │ skill    │ .github/skills/             │ ~/.copilot/skills/                 │
#  │ agent    │ .github/agents/             │ ~/.copilot/agents/                 │
#  │ mcp      │ .github/mcp/                │ ~/.copilot/mcp/                    │
#  │ hook     │ .github/hooks/              │ ~/.copilot/hooks/                  │
#  │ workflow │ .github/workflows/          │ ALWAYS local — see note below      │
#  └──────────┴─────────────────────────────┴────────────────────────────────────┘
#  Note on workflow scope: Agentic workflows compile to GitHub Actions YAML files
#  (.lock.yml) that are inherently repo-local. cpm errors if scope = "global" is
#  set on any workflow entry.
#
#  HOOKS — what they are and when they fire
#  Hooks are shell scripts (bash/PowerShell) that execute during GitHub Copilot
#  Coding Agent (CCA) sessions. They live in .github/hooks/ as JSON config files
#  + bundled scripts. Event data arrives via JSON on stdin.
#  ┌────────────────────┬────────────────────────────────────────────────────────┐
#  │ sessionStart       │ New or resumed session — init, logging, banners        │
#  │ sessionEnd         │ Session complete — cleanup, auto-commit, notifications  │
#  │ userPromptSubmit.  │ User submits a prompt — log, audit, transform          │
#  │ preToolUse         │ Before tool call — APPROVE or DENY by exit code        │
#  │ postToolUse        │ After tool call — lint, validate, record results       │
#  │ agentStop          │ Agent paused waiting for input                         │
#  │ subagentStop       │ Sub-agent paused                                       │
#  │ errorOccurred      │ Any session error — alerting, recovery logic           │
#  └────────────────────┴────────────────────────────────────────────────────────┘
#  preToolUse is the most powerful: exit non-zero to BLOCK the tool call.
#  All other hooks are non-blocking — failure does not stop the session.
#
#  AGENTIC WORKFLOWS — what they are
#  Agentic workflows are Markdown files with YAML frontmatter that describe
#  automation in natural language. Compiled to GitHub Actions YAML (.lock.yml)
#  by `gh aw compile`. Support Copilot, Claude Code, and OpenAI Codex as engines.
#  ┌─────────────────────┬───────────────────────────────────────────────────────┐
#  │ schedule            │ Cron-triggered automation — daily reports, cleanup    │
#  │ issues / pull_req.  │ Event-triggered — auto-triage, review, labelling      │
#  │ issue_comment       │ Command-invoked — /relevance-check, /fix-ci etc.      │
#  │ workflow_dispatch   │ Manually triggered — on-demand analysis               │
#  └─────────────────────┴───────────────────────────────────────────────────────┘
#  Security model: read-only by default; write access only through safe-outputs.
#  cpm installs the .md source and optionally compiles the .lock.yml.
#
#  MCP TRANSPORT TYPES
#  ┌──────────┬──────────────────────────────────────────────────────────────────┐
#  │ http     │ Remote server over plain HTTP (no local process)                 │
#  │ sse      │ Remote server over Server-Sent Events                            │
#  │ npx      │ Node.js package, spawned locally via npx (stdio)                │
#  │ uvx      │ Python package, spawned locally via uvx (stdio)                 │
#  │ docker   │ Container, spawned locally — pulled at launch time              │
#  │ binary   │ Native binary from a GitHub release (Rust, Go, C, Zig, …)      │
#  │ path     │ Local dev binary — always local scope                            │
#  │ script   │ Inline command string — escape hatch                             │
#  └──────────┴──────────────────────────────────────────────────────────────────┘
#
#  WHAT THIS FILE IS AND IS NOT
#  ✓  Human-authored. The only file you ever edit.
#  ✓  Declares intent: what you want, at what version, in which scope.
#  ✓  Contains your repo's own license (SPDX) in [package].
#  ✓  References env secrets by name (prefixed $) — values never stored here.
#  ✗  Never contains git SHAs, content hashes, dates, or file lists.
#     Those live exclusively in cpm.lock, which is machine-generated.
#
#  WHAT cpm.lock CONTAINS (never edit it)
#  • Pinned 40-char git SHA for every git-sourced asset
#  • Exact npm/PyPI version for npx/uvx MCPs; npm package integrity hash
#  • ISO 8601 commit date and resolve timestamp
#  • SHA-256 content hash of every installed file
#  • SPDX license detected from the source repo at resolve time
#  • List of every path written to disk
#  • For hooks: chmod +x state of each script file
#  • For workflows: path to the compiled .lock.yml (if auto-compile enabled)
#
#  KEY COMMANDS
#    cpm add <url> --hook                     add a hook bundle
#    cpm add <url> --workflow                 add an agentic workflow
#    cpm add <url> --skill --group research   add and immediately resolve
#    cpm sync                                 install / reconcile to lock
#    cpm sync --compile-workflows             also run gh aw compile
#    cpm update [name]                        re-resolve to latest SHA
#    cpm lock --check                         CI: fail if lock is stale
#    cpm promote <n> --hook                   move local → global atomically
#    cpm demote  <n> --hook                   move global → local atomically
#    cpm doctor                               verify hashes of all installed files
#    cpm status                               show drift between toml/lock/disk
#    cpm list [--hook] [--workflow]           inspect what is installed
#    cpm auth login                           store GitHub token in system keyring
#
# ─────────────────────────────────────────────────────────────────────────────


# ─────────────────────────────────────────────────────────────────────────────
# [package]
# ─────────────────────────────────────────────────────────────────────────────

[package]
name        = "quantum-lab"
description = "Copilot asset setup for quantum chemistry research and Python tooling"
version     = "0.3.1"
license     = "MIT OR Apache-2.0"
authors     = [
    "Anselm Hahn <anselm.hahn@example.com>",
    "Lab Automation Bot <bot@example.com>",
]
repository  = "https://github.com/example-org/quantum-lab"
created     = "2025-11-04"


# ─────────────────────────────────────────────────────────────────────────────
# [settings]
# ─────────────────────────────────────────────────────────────────────────────

[settings]
default_scope   = "local"
update_policy   = "locked"          # "locked" | "latest" | "tagged"
license_policy  = "warn-copyleft"   # "allow-all" | "warn-copyleft" | "deny-copyleft" | "allow-list"
allowed_licenses = []
cache_dir       = "~/.cache/cpm"
network_timeout = 45
auto_groups     = ["default", "research"]
verify_on_sync  = false

# Whether `cpm sync` automatically runs `gh aw compile` on installed workflows.
# Requires gh and gh-aw extension to be installed. Default false — compile manually.
auto_compile_workflows = false


# ─────────────────────────────────────────────────────────────────────────────
# [sources]
# ─────────────────────────────────────────────────────────────────────────────

[sources.corp-mirror]
url       = "https://git.corp.example.com"
token_env = "CORP_GIT_TOKEN"
replace   = "https://github.com/example-org"


# ─────────────────────────────────────────────────────────────────────────────
# [plugins]
# ─────────────────────────────────────────────────────────────────────────────

[plugins]
copilot-chat     = "https://github.com/microsoft/vscode-copilot-chat"
python-extension = { url   = "https://github.com/example-org/copilot-python-ext", rev   = "v1.4.0", scope = "global" }
internal-tools   = { url   = "https://github.com/example-org/internal-copilot-plugin", rev   = "v0.9.2" }


# ─────────────────────────────────────────────────────────────────────────────
# [skills]
# ─────────────────────────────────────────────────────────────────────────────

[skills]
python-best-practices = "https://github.com/example-org/python-skills"
code-review-guide     = "https://github.com/example-org/review-skills"
quantum-chemistry     = { url   = "https://github.com/example-org/qchem-skills", rev   = "a3f1c9d8b2e4f6a1c3d5e7f9b1a3c5e7f9b1a3c5", groups = ["research"] }
paper-writing         = { url   = "https://github.com/example-org/paper-skills", rev   = "v2.0.1", scope = "global", groups = ["default", "research"] }
draft-spectroscopy    = { path  = "./skills/spectroscopy-draft.md", groups = ["research"] }
spectroscopy-prompts  = { url   = "https://github.com/example-org/spectroscopy-skills", groups = ["research"] }
ci-prompts            = { url   = "https://github.com/example-org/ci-skills", rev   = "v1.2.0", groups = ["ci"] }


# ─────────────────────────────────────────────────────────────────────────────
# [agents]
# ─────────────────────────────────────────────────────────────────────────────

[agents]
code-reviewer    = { url   = "https://github.com/example-org/review-agent", rev   = "v1.1.0", scope = "global" }
molecule-drafter = { path  = "./agents/molecule-drafter.agent.md" }
ci-triage        = "https://github.com/example-org/ci-triage-agent"
paper-reviewer   = { url   = "https://github.com/example-org/paper-review-agent", rev   = "v1.0.0", scope = "global", groups = ["research"] }
ci-fixer         = { url   = "https://github.com/example-org/ci-fix-agent", groups = ["ci"] }


# ─────────────────────────────────────────────────────────────────────────────
# [hooks]
# Hooks are installed as folders containing hooks.json + executable scripts.
# Installed into .github/hooks/<name>/ (local) or ~/.copilot/hooks/<name>/ (global).
# cpm ensures all bundled scripts are chmod +x after install.
#
# A hook source repo must contain at minimum:
#   hooks.json        — event bindings (version, hooks.{event}[].{bash, timeoutSec})
#   <script>.sh       — referenced bash handler scripts
# The repo may also contain powershell scripts for cross-platform use.
#
# preToolUse hooks can DENY tool execution by exiting non-zero.
# All other hooks are non-blocking — failure does not stop the session.
# ─────────────────────────────────────────────────────────────────────────────

[hooks]

# Session audit logger — records every session start/end and prompt to a local log.
# Events: sessionStart, sessionEnd, userPromptSubmitted
session-logger    = { url   = "https://github.com/github/awesome-copilot", path  = "hooks/session-logger", scope = "local" }

# Auto-commit all changes when a CCA session ends cleanly.
# Events: sessionEnd
session-auto-commit = { url   = "https://github.com/github/awesome-copilot", path  = "hooks/session-auto-commit", scope = "local", groups = ["dev"] }

# Secret scanner — scans modified files before they are written.
# Uses preToolUse to BLOCK writes if credentials or API keys are detected.
# Events: preToolUse (blocking), postToolUse (logging)
secret-scanner    = { url   = "https://github.com/example-org/copilot-hooks", rev   = "v1.2.0", scope = "local" }

# Org-wide compliance policy hook — shows a banner at session start and
# blocks any bash tool call that matches a deny-list pattern.
# Installed globally so it applies to all repos on this machine.
# Events: sessionStart (informational), preToolUse (blocking)
corp-policy       = { url   = "https://github.com/example-org/corp-copilot-policy", rev   = "v2.0.0", scope = "global" }

# Hook that logs every tool call to a research audit trail.
# Events: preToolUse (logging only, always exits 0), postToolUse
research-audit    = { url   = "https://github.com/example-org/research-hooks", path  = "hooks/research-audit", rev   = "v1.1.0", scope = "local", groups = ["research"] }

# Local dev hook — Slack notification on session end (dev group only).
# Events: sessionEnd
[hooks.slack-notify]
path  = "./hooks/slack-notify"
groups = ["dev"]
scope = "local"

[hooks.slack-notify.env]
SLACK_WEBHOOK_URL = "$SLACK_WEBHOOK_URL"   # secret — never written to disk


# ─────────────────────────────────────────────────────────────────────────────
# [workflows]
# Agentic workflows are Markdown files with YAML frontmatter compiled to
# GitHub Actions YAML (.lock.yml) by `gh aw compile`. Always local scope.
# Installed into .github/workflows/ — which is where GitHub Actions reads them.
#
# cpm installs the .md source file. Compilation to .lock.yml is either:
#   • manual: run `gh aw compile .github/workflows/<name>.md`
#   • automatic: set settings.auto_compile_workflows = true (requires gh + gh-aw)
#
# A workflow source must contain YAML frontmatter with at minimum:
#   name, description, on (triggers), permissions, safe-outputs
# Optionally: engine (default "copilot"), tools, agent fields.
#
# Supported engines: "copilot" | "claude" | "codex"
# Scope is always "local" — cpm errors on scope = "global" for workflows.
# ─────────────────────────────────────────────────────────────────────────────

[workflows]

# Daily issue triage — labels, summarises, and routes new issues automatically.
# Trigger: schedule (every morning), issue_comment (/triage command)
# Engine: copilot (default)
daily-triage      = { url   = "https://github.com/github/awesome-copilot", path  = "workflows/daily-issues-report.md", rev   = "main" }

# Relevance check — invoked manually via /relevance-check comment on an issue.
# Trigger: issue_comment
relevance-check   = { url   = "https://github.com/github/awesome-copilot", path  = "workflows/relevance-check.md", rev   = "main" }

# Weekly org health report — stale issues, merge times, contributor leaderboard.
# Trigger: schedule (weekly)
# Engine: claude (Claude Code) for richer analysis
weekly-health     = { url   = "https://github.com/github/awesome-copilot", path  = "workflows/weekly-health-report.md", rev   = "main", engine = "claude" }

# CI failure investigator — runs when a CI workflow fails and posts a root-cause
# analysis as a PR comment. Dispatches automatically on workflow_run failure.
# Trigger: workflow_run (on failure)
# Engine: copilot
ci-investigator   = { url   = "https://github.com/example-org/copilot-workflows", path  = "workflows/ci-failure-analysis.md", rev   = "v1.0.0", groups = ["dev"] }

# Release compliance checker — audits a repo against open-source release
# requirements and posts a report as an issue comment.
# Trigger: workflow_dispatch (manual)
release-checker   = { url   = "https://github.com/github/awesome-copilot", path  = "workflows/ospo-release-compliance-checker.md", rev   = "main", groups = ["ci"] }

# Monthly contributor metrics workflow scoped to research group.
contributor-metrics = { url = "https://github.com/github/awesome-copilot", path = "workflows/contributor-metrics.md", rev = "main", groups = ["research"] }

# Local draft workflow under active development — not yet published.
# Install the .md source; compile manually with `gh aw compile`.
molecule-reporter = { path   = "./workflows/molecule-reporter.md", engine = "claude", groups  = ["research"] }


# ─────────────────────────────────────────────────────────────────────────────
# [mcps]
# ─────────────────────────────────────────────────────────────────────────────

# ── http ─────────────────────────────────────────────────────────────────────
[mcps.github-remote]
transport = "http"
url       = "https://api.github.com/mcp"
scope     = "global"

# ── sse ──────────────────────────────────────────────────────────────────────
[mcps.lab-sse-server]
transport = "sse"
url       = "https://mcp.lab.example.com/sse"
scope     = "local"

# ── npx ──────────────────────────────────────────────────────────────────────
[mcps.github]
transport = "npx"
package   = "@modelcontextprotocol/server-github"
rev       = ">=1.4.0"
scope     = "global"

[mcps.github.env]
GITHUB_TOKEN  = "$GITHUB_TOKEN"

[mcps.brave-search]
transport = "npx"
package   = "@modelcontextprotocol/server-brave-search"
scope     = "global"

[mcps.brave-search.env]
BRAVE_API_KEY = "$BRAVE_API_KEY"

[mcps.filesystem-npx]
transport = "npx"
package   = "@modelcontextprotocol/server-filesystem"
args      = ["/workspace", "/tmp"]
scope     = "local"

# ── uvx ──────────────────────────────────────────────────────────────────────
[mcps.git-server]
transport = "uvx"
package   = "mcp-server-git"
rev       = ">=0.6.0"
args      = ["--repository", "."]
scope     = "local"

[mcps.arxiv-mcp]
transport = "uvx"
package   = "arxiv-mcp-server"
rev       = ">=0.3.0"
scope     = "local"
groups    = ["research"]

[mcps.arxiv-mcp.env]
ARXIV_MAX_RESULTS = "25"

# ── docker ───────────────────────────────────────────────────────────────────
[mcps.postgres]
transport = "docker"
image     = "ghcr.io/example-org/mcp-postgres:latest"
scope     = "local"

[mcps.postgres.env]
POSTGRES_URL  = "$POSTGRES_URL"
POSTGRES_POOL = "5"

[mcps.rdkit-chem]
transport = "docker"
image     = "ghcr.io/example-org/mcp-rdkit:v2024.09"
args      = ["--log-level", "info"]
scope     = "local"
groups    = ["research"]

[mcps.rdkit-chem.env]
RDKIT_TIMEOUT = "60"

# ── binary ───────────────────────────────────────────────────────────────────
[mcps.quantum-solver]
transport = "binary"
url       = "https://github.com/example-org/quantum-mcp/releases/latest"
bin       = "quantum-mcp"
args      = ["--threads", "8"]
scope     = "local"
groups    = ["research"]

[mcps.go-literature]
transport = "binary"
url       = "https://github.com/example-org/literature-mcp/releases/tag/v0.4.1"
bin       = "literature-mcp"
checksum  = "sha256:a1b2c3d4e5f6..."
scope     = "global"
groups    = ["research"]

# ── path ─────────────────────────────────────────────────────────────────────
[mcps.new-spectroscopy-mcp]
transport = "path"
path      = "./mcp/spectroscopy/target/release/spectroscopy-mcp"
args      = ["--dev", "--port", "9000"]
scope     = "local"
groups    = ["dev"]

[mcps.new-spectroscopy-mcp.env]
LOG_LEVEL     = "debug"
SPEC_DATA_DIR = "./data/spectra"

# ── script ───────────────────────────────────────────────────────────────────
[mcps.legacy-wrapper]
transport = "script"
command   = "python"
args      = ["-m", "legacy_mcp_server", "--host", "127.0.0.1", "--port", "8080"]
scope     = "local"
groups    = ["dev"]

[mcps.legacy-wrapper.env]
LEGACY_API_KEY = "$LEGACY_API_KEY"


# ─────────────────────────────────────────────────────────────────────────────
# [groups.*] metadata
# ─────────────────────────────────────────────────────────────────────────────

[groups.research]
description = "Quantum chemistry, literature, and spectroscopy tooling (auto-installed)"


[groups.dev]
description = "Local dev hooks, MCPs, and workflows — not for CI or other repos"
# Members declared inline above via groups = ["dev"].


[groups.ci]
description = "Minimal set for CI pipelines — no heavy MCPs or research tools"
