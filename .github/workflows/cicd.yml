name: CI/CD

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
      - docs/**
      - refactor/**
      - test/**
      - ci/**
      - perf/**
      - style/**
      - build/**
      - copilot/**
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'

# ── Lint ─────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & lefthook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync dependencies
        run: uv sync --group dev --python ${{ env.PYTHON_VERSION }}

      - name: Verify lefthook config exists
        run: test -f lefthook.yml

      - name: Run lefthook hooks
        run: uvx lefthook run pre-commit --all-files

# ── Primary test suite (Linux — full) ────────────────────────────────────────
  test:
    name: Tests (ubuntu-latest)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync dependencies
        run: uv sync --group dev --python ${{ env.PYTHON_VERSION }}

      - name: Run type checker
        run: uv run ty check --output-format github

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run lint, Python tests, and build
        run: uv run --group dev poe ci-full

# ── Verify cpm tooling in an isolated repo ───────────────────────────────────
  verify-overview:
    name: Verify overview command
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --group dev --python ${{ env.PYTHON_VERSION }}

      - name: Verify overview command in a fresh repo
        run: |
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          uv run --project "$GITHUB_WORKSPACE" cpm init --name ci-overview
          uv run --project "$GITHUB_WORKSPACE" cpm overview --json

# ── Frozen smoke-tests on macOS and Windows ──────────────────────────────────
  smoke:
    name: Smoke (frozen) — ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies (frozen)
        run: uv sync --group dev --python ${{ env.PYTHON_VERSION }} --frozen

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Smoke — cpm --help
        run: uv run --group dev poe smoke

# ── Multi-platform wheel + sdist build ───────────────────────────────────────
  build-distributions:
    name: Build distributions (${{ matrix.os }})
    needs: [test, verify-overview, smoke]
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync dependencies
        run: uv sync --group dev --python ${{ env.PYTHON_VERSION }}

      - name: Compute published package version
        shell: bash
        run: |
          version="$(python scripts/ci_version.py compute)"
          echo "PUBLISHED_VERSION=$version" >> "$GITHUB_ENV"
          echo "Using published package version: $version"

      - name: Apply CI candidate version metadata
        if: github.ref == 'refs/heads/main'
        run: python scripts/ci_version.py apply "$PUBLISHED_VERSION"

      - name: Build source distribution (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path crates/cpm-cli/Cargo.toml --out dist

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path crates/cpm-cli/Cargo.toml --out dist
          manylinux: auto

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions-${{ matrix.os }}
          path: dist/

# ── Validate all wheels with twine ───────────────────────────────────────────
  check-distributions:
    name: Check distributions
    needs: build-distributions
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: python-package-distributions-*
          path: dist/
          merge-multiple: true

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Upload merged distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

# ── Generate an SBOM for release artifacts ──────────────────────────────────
  sbom:
    name: Generate SBOM
    needs: check-distributions
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-sbom
          path: sbom.spdx.json

# ── Publish to TestPyPI (unique dev candidates on main, finals on tags) ─────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: check-distributions
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/copilot-plugin-manager
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  verify-testpypi:
    name: Verify TestPyPI package
    needs: publish-testpypi
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Compute published package version
        shell: bash
        run: |
          version="$(python scripts/ci_version.py compute)"
          echo "PUBLISHED_VERSION=$version" >> "$GITHUB_ENV"
          echo "Verifying published package version: $version"

      - name: Install release from TestPyPI
        run: |
          python -m pip install --upgrade pip
          for attempt in $(seq 1 8); do
            if python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ "copilot-plugin-manager==${PUBLISHED_VERSION}"; then
              break
            fi
            if [ "$attempt" -eq 8 ]; then
              echo "Package was not installable from TestPyPI after retries."
              exit 1
            fi
            echo "Retrying TestPyPI install in 20s (attempt ${attempt}/8)..."
            sleep 20
          done

      - name: Smoke test installed commands
        run: |
          cpm --help
          copilot-plugin-manager --help
          python -m cpm --help

# ── Publish to PyPI (tagged releases only) ───────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [check-distributions, sbom, publish-testpypi, verify-testpypi]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/copilot-plugin-manager
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Publish GitHub release assets
    needs: [publish-pypi, sbom]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Download SBOM artifact
        uses: actions/download-artifact@v8
        with:
          name: release-sbom
          path: release-artifacts/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            release-artifacts/sbom.spdx.json
