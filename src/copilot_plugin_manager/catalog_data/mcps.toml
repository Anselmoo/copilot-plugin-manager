# Default MCP servers managed by copilot-plugin-manager.
#
# kind = "npm"    — installed at runtime via npx; package = npm package name.
# kind = "pip"    — installed at runtime via uvx; package = PyPI package name.
# kind = "http"   — remote HTTP/SSE server; url = endpoint (no local install).
# kind = "local"  — definition discovered from .vscode/mcp.json in the repo.
# kind = "docker" — run via docker; command/args configure the container invocation.
#
# pinned_tag  — official npm/git/pypi tag to pin (preferred over SHA when available).
# pinned_sha  — git SHA to pin when no stable tag exists (fallback).
# version_channel — "latest" or a dist-tag; only consulted when neither
#                   pinned_tag nor pinned_sha is set.
#
# These are the catalog defaults. Local `.vscode/mcp.json` entries are
# merged at sync time and stored separately in state.

[mcps."ai-agent-guidelines"]
kind = "npm"
package = "@Anselmoo/mcp-ai-agent-guidelines"
description = "AI Agent Guidelines — curated best practices and quality criteria for building reliable AI agents."
use_when = "Use when designing or reviewing AI agent architectures, tooling strategies, and reliability patterns."
source_url = "https://github.com/Anselmoo/mcp-ai-agent-guidelines"
version_channel = "latest"
tags = ["agents", "general"]

[mcps."azure"]
kind = "npm"
package = "@azure/mcp"
args = ["server", "start"]
description = "Azure MCP Server — official Microsoft Azure integration covering 40+ Azure services including storage, databases, AI, and cloud infrastructure."
use_when = "Use when working with Azure resources, deploying to Azure, or automating Azure service interactions from an AI assistant."
source_url = "https://github.com/microsoft/mcp"
version_channel = "latest"
pinned_tag = "2.0.0-beta.27"
tags = ["devops", "github"]

[mcps."brave-search"]
kind = "npm"
package = "@modelcontextprotocol/server-brave-search"
description = "Brave Search MCP — private web and local search via the Brave Search API."
use_when = "Use when the assistant needs to perform web research or look up current information without sending queries to ad-tracking search engines."
source_url = "https://github.com/modelcontextprotocol/servers-archived/tree/main/src/brave-search"
version_channel = "latest"
pinned_tag = "0.6.2"
tags = ["general", "planning"]

[mcps."chrome-devtools"]
kind = "npm"
package = "chrome-devtools-mcp"
description = "Chrome DevTools MCP — exposes Chrome DevTools Protocol capabilities for browser debugging, performance profiling, and DOM inspection."
use_when = "Use when debugging frontend regressions, profiling page performance, or automating browser inspection tasks."
source_url = "https://github.com/ChromeDevTools/chrome-devtools-mcp"
version_channel = "latest"
pinned_tag = "0.20.0"
tags = ["frontend", "testing"]

[mcps."context7"]
kind = "http"
url = "https://mcp.context7.com/mcp"
description = "Context7 — live library documentation and curated code examples, always up to date."
use_when = "Use when you need current, authoritative documentation for popular libraries and frameworks."
source_url = "https://github.com/upstash/context7"
tags = ["docs", "planning"]

